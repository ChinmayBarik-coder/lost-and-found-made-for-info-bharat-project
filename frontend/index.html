<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo | Lost & Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Base & Reset --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Glassmorphism Utility --- */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* --- Layout --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* --- Navbar --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Hero Section --- */
        .hero {
            text-align: center;
            margin-bottom: 4rem;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero p {
            color: #94a3b8;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 2rem auto;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.8);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px rgba(99, 102, 241, 0.9);
        }

        /* --- Item Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            padding: 1.5rem;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .badge {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge.lost { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border: 1px solid #ef4444; }
        .badge.found { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid #10b981; }

        .card-icon {
            font-size: 2.5rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: #f1f5f9;
        }

        .card p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-btn:hover { color: white; }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            border-color: #6366f1;
        }

        select.form-control option { background: #1e1b4b; color: white; }

        .submit-btn { width: 100%; justify-content: center; margin-top: 1rem; }
    </style>
</head>
<body>

    <div class="container">
        <nav class="glass">
            <div class="logo"><i class="fa-solid fa-radar"></i> Echo</div>
        </nav>

        <section class="hero">
            <h1>Lost it? Found it?<br>Let's Echo it out.</h1>
            <p>The modern, centralized hub to report missing belongings or declare items you've found across campus.</p>
            <button class="btn btn-primary" onclick="openModal()">
                <i class="fa-solid fa-plus"></i> Report an Item
            </button>
        </section>

        <section class="grid" id="itemGrid">
            </section>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="glass modal-content">
            <div class="modal-header">
                <h2>Report Item</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <form id="itemForm">
                <div class="form-group">
                    <label>Report Type</label>
                    <select class="form-control" id="itemType" required>
                        <option value="lost">I Lost Something</option>
                        <option value="found">I Found Something</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Item Name</label>
                    <input type="text" class="form-control" id="itemName" placeholder="e.g., Blue Notebook" required>
                </div>
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" class="form-control" id="itemLocation" placeholder="e.g., Central Library" required>
                </div>
                <button type="submit" class="btn btn-primary submit-btn">Submit Report</button>
            </form>
        </div>
    </div>

    <script>
        // Mock Database
        let items = [
            { id: 1, type: 'lost', name: 'Car Keys with Leather Strap', location: 'Cafeteria, Table 4', date: 'Just now', icon: 'fa-key' },
            { id: 2, type: 'found', name: 'Black Wireless Earbuds', location: 'Lecture Hall B', date: '2 hours ago', icon: 'fa-headphones' },
            { id: 3, type: 'lost', name: 'MacBook Charger', location: 'Library, 2nd Floor', date: 'Yesterday', icon: 'fa-plug' }
        ];

        const itemGrid = document.getElementById('itemGrid');
        const modalOverlay = document.getElementById('modalOverlay');
        const itemForm = document.getElementById('itemForm');

        // Function to determine icon based on input name (simple heuristic)
        function getIcon(name) {
            const lowerName = name.toLowerCase();
            if(lowerName.includes('key')) return 'fa-key';
            if(lowerName.includes('phone') || lowerName.includes('mobile')) return 'fa-mobile-screen';
            if(lowerName.includes('bag')) return 'fa-bag-shopping';
            if(lowerName.includes('book')) return 'fa-book';
            if(lowerName.includes('card') || lowerName.includes('wallet')) return 'fa-wallet';
            return 'fa-box'; // default icon
        }

        // Render Items to UI
        function renderItems() {
            itemGrid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass card';
                card.innerHTML = `
                    <div class="badge ${item.type}">${item.type}</div>
                    <i class="fa-solid ${item.icon} card-icon"></i>
                    <h3>${item.name}</h3>
                    <p><i class="fa-solid fa-location-dot"></i> ${item.location}</p>
                    <p><i class="fa-regular fa-clock"></i> ${item.date}</p>
                `;
                itemGrid.appendChild(card);
            });
        }

        // Modal Controls
        function openModal() {
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            itemForm.reset();
        }

        // Handle Form Submission
        itemForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const type = document.getElementById('itemType').value;
            const name = document.getElementById('itemName').value;
            const location = document.getElementById('itemLocation').value;

            // Add new item to array
            items.unshift({
                id: Date.now(),
                type: type,
                name: name,
                location: location,
                date: 'Just now',
                icon: getIcon(name)
            });

            renderItems();
            closeModal();
        });

        // Close modal when clicking outside of it
        modalOverlay.addEventListener('click', function(e) {
            if(e.target === modalOverlay) closeModal();
        });

        // Initial Render
        renderItems();
    </script>
</body>
</html>
